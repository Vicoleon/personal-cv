<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="white"/>
  <!-- Walmart Spark — 6 rounded petals around centre -->
  <g transform="translate(50,50)">
    <!-- petal 0° -->
    <rect x="-4" y="-26" width="8" height="18" rx="4" fill="#FFC220"/>
    <!-- petal 60° -->
    <rect x="-4" y="-26" width="8" height="18" rx="4" fill="#FFC220" transform="rotate(60)"/>
    <!-- petal 120° -->
    <rect x="-4" y="-26" width="8" height="18" rx="4" fill="#FFC220" transform="rotate(120)"/>
    <!-- petal 180° -->
    <rect x="-4" y="-26" width="8" height="18" rx="4" fill="#FFC220" transform="rotate(180)"/>
    <!-- petal 240° -->
    <rect x="-4" y="-26" width="8" height="18" rx="4" fill="#FFC220" transform="rotate(240)"/>
    <!-- petal 300° -->
    <rect x="-4" y="-26" width="8" height="18" rx="4" fill="#FFC220" transform="rotate(300)"/>
  </g>
  <!-- "Walmart" wordmark below spark -->
  <text x="50" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="13" fill="#0071CE">Walmart</text>
</svg>
