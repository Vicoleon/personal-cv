<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="white"/>
  <!-- Flat-top hexagon with rounded joins — Greenslate brand green -->
  <path d="M100,24 L164,62 L164,138 L100,176 L36,138 L36,62 Z"
        fill="none" stroke="#1AAD3C" stroke-width="12" stroke-linejoin="round"/>
  <!-- Outer (large) upward chevron -->
  <polyline points="54,155 100,65 146,155"
            fill="none" stroke="#1AAD3C" stroke-width="12"
            stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Inner (small) upward chevron — creates the double-chevron A mark -->
  <polyline points="74,155 100,103 126,155"
            fill="none" stroke="#1AAD3C" stroke-width="12"
            stroke-linejoin="round" stroke-linecap="round"/>
</svg>
