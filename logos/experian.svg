<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="white"/>
  <!-- Large purple square — top left -->
  <rect x="14" y="22" width="44" height="44" rx="8" fill="#7B2D8C"/>
  <!-- Medium cornflower-blue square — top center -->
  <rect x="82" y="14" width="34" height="34" rx="6" fill="#6495CC"/>
  <!-- Small hot-pink square — top right -->
  <rect x="148" y="18" width="22" height="22" rx="5" fill="#E5447F"/>
  <!-- Small hot-pink square — middle left -->
  <rect x="12" y="104" width="24" height="24" rx="5" fill="#E5447F"/>
  <!-- Large hot-pink square — bottom center -->
  <rect x="76" y="152" width="40" height="40" rx="7" fill="#E5447F"/>
  <!-- Blue lowercase "e" — dominant mark -->
  <text x="96" y="142" font-family="Georgia,serif" font-weight="700"
        font-size="88" fill="#1661B3" font-style="italic">e</text>
  <!-- Registration mark -->
  <text x="158" y="110" font-family="Arial,sans-serif" font-size="16"
        fill="#1661B3">®</text>
</svg>
